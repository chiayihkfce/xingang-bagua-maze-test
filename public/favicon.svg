<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 1. Octagon Background (Black) -->
  <path d="M30 0 L70 0 L100 30 L100 70 L70 100 L30 100 L0 70 L0 30 Z" fill="black"/>
  
  <!-- 2. White Inner Octagon for contrast -->
  <path d="M31 2 L69 2 L98 31 L98 69 L69 98 L31 98 L2 69 L2 31 Z" fill="white" opacity="0.1"/>

  <!-- 3. Taiji Center (Perfect S-Curve) -->
  <g transform="translate(50, 50) scale(0.32)">
    <circle cx="0" cy="0" r="48" fill="white" stroke="white" stroke-width="1"/>
    <path d="M 0 -48 A 48 48 0 0 1 0 48 A 24 24 0 0 1 0 0 A 24 24 0 0 0 0 -48" fill="black"/>
    <circle cx="0" cy="-24" r="8" fill="white"/>
    <circle cx="0" cy="24" r="8" fill="black"/>
  </g>

  <!-- 4. The Eight Trigrams (Yao Lines) -->
  <g fill="white" transform="translate(50, 50)">
    <!-- Definitions: Solid (Yang) and Broken (Yin) -->
    <defs>
      <rect id="yang" x="-9" width="18" height="2.5" rx="0.5"/>
      <g id="yin">
        <rect x="-9" width="7.5" height="2.5" rx="0.5"/>
        <rect x="1.5" width="7.5" height="2.5" rx="0.5"/>
      </g>
    </defs>

    <!-- 0° Top: Qian (Heaven ☰) -->
    <g transform="rotate(0) translate(0, -38)">
      <use href="#yang" y="0"/> <use href="#yang" y="4"/> <use href="#yang" y="8"/>
    </g>
    <!-- 180° Bottom: Kun (Earth ☷) -->
    <g transform="rotate(180) translate(0, -38)">
      <use href="#yin" y="0"/> <use href="#yin" y="4"/> <use href="#yin" y="8"/>
    </g>
    <!-- 90° Right: Kan (Water ☵) -->
    <g transform="rotate(90) translate(0, -38)">
      <use href="#yin" y="0"/> <use href="#yang" y="4"/> <use href="#yin" y="8"/>
    </g>
    <!-- 270° Left: Li (Fire ☲) -->
    <g transform="rotate(270) translate(0, -38)">
      <use href="#yang" y="0"/> <use href="#yin" y="4"/> <use href="#yang" y="8"/>
    </g>
    <!-- 45° Top-Right: Xun (Wind ☴) -->
    <g transform="rotate(45) translate(0, -38)">
      <use href="#yang" y="0"/> <use href="#yang" y="4"/> <use href="#yin" y="8"/>
    </g>
    <!-- 135° Bottom-Right: Zhen (Thunder ☳) -->
    <g transform="rotate(135) translate(0, -38)">
      <use href="#yin" y="0"/> <use href="#yin" y="4"/> <use href="#yang" y="8"/>
    </g>
    <!-- 225° Bottom-Left: Gen (Mountain ☶) -->
    <g transform="rotate(225) translate(0, -38)">
      <use href="#yang" y="0"/> <use href="#yin" y="4"/> <use href="#yin" y="8"/>
    </g>
    <!-- 315° Top-Left: Dui (Lake ☱) -->
    <g transform="rotate(315) translate(0, -38)">
      <use href="#yin" y="0"/> <use href="#yang" y="4"/> <use href="#yang" y="8"/>
    </g>
  </g>
</svg>
